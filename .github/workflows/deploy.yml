name: Update Data and Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ai-news-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch and translate current AI news
        run: node scripts/fetch-data.js

      - name: Validate generated data
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('public/data.json', 'utf8'));
          const items = data.news?.items;
          const fetchedAt = Date.parse(data.news?.fetchedAt);
          const japanese = /[\u3040-\u30ff\u3400-\u9fff]/;

          if (!Array.isArray(items) || items.length !== 5) {
            throw new Error('The generated file must contain exactly five news items.');
          }
          if (data.news.mock === true) {
            throw new Error('Mock data must not be deployed.');
          }
          if (!Number.isFinite(fetchedAt) || Date.now() - fetchedAt > 15 * 60 * 1000) {
            throw new Error('fetchedAt is missing or stale.');
          }
          for (const item of items) {
            if (!item.url || !japanese.test(item.titleJa || '') || !japanese.test(item.summaryJa || '')) {
              throw new Error(`Invalid Japanese news item: ${item.title || 'unknown'}`);
            }
          }
          console.log(`Validated ${items.length} items generated at ${data.news.fetchedAt}`);
          NODE

      - name: Deploy only validated data
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          clean: true
