name: Update Data & Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 * * * *'  # 毎時実行
  push:
    branches: [main, claude/ai-news-trends-site-1FbNz]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest data
        run: node scripts/fetch-data.js

      - name: Show data summary
        run: |
          node -e "
            const d = require('./public/data.json');
            console.log('===== DATA SUMMARY =====');
            console.log('News  mock:', d.news.mock,  '| count:', d.news.items.length);
            console.log('Tweet mock:', d.tweets.mock, '| count:', d.tweets.items.length);
            if (d.news.items[0]) console.log('Top story :', d.news.items[0].title);
            if (d.news.items[0]) console.log('titleJa   :', d.news.items[0].titleJa);
            console.log('fetchedAt :', d.news.fetchedAt);
            console.log('========================');
          "

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          clean: true
