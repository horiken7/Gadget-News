<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1117">
  <title>AI News Trends</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-title">
        <span class="header-icon">⚡</span>
        <h1>AI News Trends</h1>
      </div>
      <button id="refresh-btn" class="refresh-btn" aria-label="最新情報を取得">
        <svg class="refresh-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        <span>更新</span>
      </button>
    </div>
  </header>

  <main>
    <div class="grid">
      <section class="section" id="news-section">
        <div class="section-header">
          <div class="section-badge news-badge">AI</div>
          <h2>AIに関するバズったニュース</h2>
        </div>
        <div class="cards-container" id="news-cards">
          <!-- Populated by app.js -->
        </div>
      </section>

      <section class="section" id="trends-section">
        <div class="section-header">
          <div class="section-badge trends-badge">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.259 5.631 5.905-5.631zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </div>
          <h2>Xのバズったツイート</h2>
        </div>
        <div class="cards-container" id="trends-cards">
          <!-- Populated by app.js -->
        </div>
      </section>
    </div>
  </main>

  <footer>
    <span id="last-updated">読み込み中...</span>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
