<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0d18">
  <title>AI News Trends</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <h1 class="hero-title">今日の <span class="c-purple">バズった</span> <span class="c-pink">AI</span> ニュース</h1>
    <p class="hero-sub" id="hero-date">最も話題になったAIトピックを厳選</p>
  </header>

  <p class="hero-sub last-updated-bar" id="hero-last-updated"></p>

  <div class="action-bar">
    <button id="refresh-btn" class="refresh-btn" aria-label="最新情報を取得">
      <svg class="refresh-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <polyline points="1 20 1 14 7 14"></polyline>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
      <span>更新</span>
    </button>
  </div>

  <main>
    <section>
      <div id="news-cards"></div>
    </section>

  </main>

  <footer>
    <span id="last-updated">読み込み中...</span>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
